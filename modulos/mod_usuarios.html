<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="../css/usuarios.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>

<body>
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item">
                usuarios
            </a>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <div class="buttons">
                    <a class="button is-light" href="../index.html">
                        inicio
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <h1>USUARIOS</h1>

    <div class="field">
        <label class="label">nombre_completo</label>
        <div class="control">
            <input id="nombre" class="input" type="text" placeholder="su nombre completo" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Email</label>
        <div class="control">
            <input id="email" class="input" type="email" placeholder="e.g. alexsmith@gmail.com" required>
        </div>
    </div>

    <div class="field">
        <label class="label">numero_Celular</label>
        <div class="control">
            <input id="numeroCelular" class="input" type="text" placeholder="numeroCelular" required>
        </div>
    </div>

    <div class="field">
        <label class="label">genero</label>
        <div class="control">
            <input id="genero" class="input" type="text" placeholder="ingrese su genero" required>
        </div>
    </div>

    <div class="field">
        <label class="label">fecha_nacimiento</label>
        <div class="control">
            <input id="fechaN" class="input" type="text" placeholder="fecha de nacimiento" required>
        </div>
    </div>

    <div class="field">
        <label class="label">direccion</label>
        <div class="control">
            <input id="direccion" class="input" type="text" placeholder="su direccion" required>
        </div>
    </div>

    <div class="field">
        <label class="label">contraseña</label>
        <div class="control">
            <input id="contraseña" class="input" type="text" placeholder="ingrese su contraseña" required>
        </div>
    </div>

    </div>
    <hr>
    <div class="buttons is-flex is-justify-content-center">
        <a type="button" class="button is-danger" href="../index.html">Home</a>
        <button class="button is-info is-dark" id="btnGuardar">Guardar</button>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/javascript/usuarios.js"></script>
</body>


</html>
