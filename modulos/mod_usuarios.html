    <div class="field">

        <div class="control has-icons-left has-icons-right">
            <input class="input is-success" type="text" placeholder="ejemplo: (samx_09)">

        <p class="control">
            <input class="input" type="text" placeholder="colocar tu email">

    </div>
   <div class="contraseña" id="contraseña">

            </span>
        </p>
    </div>
    <div class="field">
        <p class="control">

            </button>

        </div>

            </span>
