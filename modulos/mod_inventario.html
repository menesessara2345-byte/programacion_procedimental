<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <title>Formulario Inventario</title>
</head>
<body>

    <h1 class="title has-text-centered">Formulario Inventario</h1>

    <div class="container">
        <div class="box">

            <form>

                <!-- Código -->
                <div class="field">
                    <label class="label">Código Producto</label>
                    <div class="control">
                        <input id="codigo_producto" class="input" type="text" placeholder="Ingrese el código">
                    </div>
                </div>

                <!-- Nombre -->
                <div class="field">
                    <label class="label">Nombre Producto</label>
                    <div class="control">
                        <input id="nombre_producto" class="input" type="text" placeholder="Ingrese el nombre">
                    </div>
                </div>

                <!-- Precio -->
                <div class="field">
                    <label class="label">Precio Producto</label>
                    <div class="control">
                        <input id="precio_producto" class="input" type="number" placeholder="Ingrese el precio">
                    </div>
                </div>

                <!-- Cantidad -->
                <div class="field">
                    <label class="label">Cantidad Producto</label>
                    <div class="control">
                        <input id="cantidad_producto" class="input" type="number" placeholder="Ingrese la cantidad">
                    </div>
                </div>

                <!-- Marca -->
                <div class="field">
                    <label class="label">Marca Producto</label>
                    <div class="control">
                        <input id="marca_producto" class="input" type="text" placeholder="Ingrese la marca">
                    </div>
                </div>

                <!-- Categoría -->
                <div class="field">
                    <label class="label">Categoría Producto</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select id="categoria_producto">
                                <option value="">Seleccione una categoría</option>
                                <option>Comida</option>
                                <option>Bebida</option>
                                <option>Adición</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Unidad -->
                <div class="field">
                    <label class="label">Unidad de Medida</label>
                    <div class="control">
                        <input id="unidad_medida" class="input" type="text" placeholder="Ej: gramos, ml, kg">
                    </div>
                </div>

                <!-- Botón -->
                <div class="field">
                    <div class="control">
                        <button type="button" onclick="ValidarDatos()" class="button is-primary is-fullwidth">
                            Guardar Producto
                        </button>
                    </div>
                </div>

            </form>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
