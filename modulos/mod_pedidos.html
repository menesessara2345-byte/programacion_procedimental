<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/pedidos.css">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>

<body>
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item">
                pedidos
            </a>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <div class="buttons">
                    <a class="button is-light" href="../index.html">
                        inicio
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <h1>PEDIDOS</h1>
    <div class="field">
        <label class="label">direccion</label>
        <div class="control">
            <input id="direccion" class="input" type="text" placeholder="direccion">
        </div>
    </div>

    <div class="field">
        <label class="label">telefono</label>
        <div class="control has-icons-left has-icons-right">
            <input id="telefono" class="input is-success" type="number" placeholder="telefono" value="bulma" required>

            <div class="field">
                <label class="label">Email</label>
                <div class="control has-icons-left has-icons-right">
                    <input id="Email" class="input is-danger" type="email" placeholder="Email input" value="hello@" required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <span class="icon is-small is-right">
                        <i class="fas fa-exclamation-triangle"></i>
                    </span>
                </div>
                <p class="help is-danger">This email is invalid</p>
            </div>

            <div class="field">
                <label class="label">MetodoDePago</label>
                <div class="control">
                    <input id="MetodoDePago" class="input" type="text" placeholder="MetodoDePago" required>
                </div>
            </div>

            <div class="field">
                <label class="label">pedido</label>
                <div class="control">
                    <input id="pedido" class="input" type="text" placeholder="pedido" required>
                </div>
            </div>

            <div class="field">
                <label class="label">nombre</label>
                <div class="control">
                    <input id="nombre" class="input" type="text" placeholder="nombre" required>
                </div>
            </div>

            <div class="field">
                <label class="label">referencias</label>
                <div class="control">
                    <input id="referencias" class="input" type="text" placeholder="referencias" required>
                </div>
            </div>


              </div>
            <hr>
            <div class="buttons is-flex is-justify-content-center">
                <a type="button" class="button is-danger" href="../index.html">Home</a>
                <button class="button is-info is-dark" id="btnGuardar">Guardar</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/javascript/pedidos.js"></script>
</body>



</html>
